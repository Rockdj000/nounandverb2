<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'">
<title>Noise · verbandnoun.io</title>
<link rel="icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Hanken+Grotesk:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #EFEBE6; font-family: 'Hanken Grotesk', sans-serif; color: #283420; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
  ::selection { background: #EC8E90; color: #2E3C24; }
  .back-link { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 1px; text-transform: lowercase; color: #8a8578; text-decoration: none; transition: color .22s; }
  .back-link:hover { color: #C45F61; }
  /* translucent interactive surface — fills the area between header and footer */
  #noise-canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; cursor: crosshair; touch-action: none; }

  /* ── controls drawer (in flow, sits above the footer) ── */
  #ctrl-drawer {
    position: relative; z-index: 50;
    background: rgba(29,39,24,.92);
    backdrop-filter: blur(12px);
    border-top: 1px solid rgba(255,255,255,.08);
  }

  /* settings bar — matches the Tonys style/size */
  #ctrl-tab {
    height: 36px; display: flex; align-items: center; justify-content: center;
    gap: 8px; cursor: pointer;
    font-family: 'Space Mono', monospace; font-size: 12.5px; font-weight: 700;
    letter-spacing: 2.5px; text-transform: uppercase; color: #EC8E90;
    user-select: none; transition: color .2s;
  }
  #ctrl-tab:hover { color: #f0a6a8; }
  #ctrl-arrow { transition: transform .38s cubic-bezier(.2,.7,.2,1); display: inline-block; }
  #ctrl-drawer.open #ctrl-arrow { transform: rotate(180deg); }

  #ctrl-body {
    padding: 0 clamp(20px,5vw,64px);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px 48px;
    max-height: 0; overflow: hidden;
    transition: max-height .42s cubic-bezier(.2,.7,.2,1), padding .42s cubic-bezier(.2,.7,.2,1);
  }
  #ctrl-drawer.open #ctrl-body { max-height: 80vh; padding: 16px clamp(20px,5vw,64px) 24px; overflow-y: auto; }

  .ctrl-group { display: flex; flex-direction: column; gap: 14px; }
  .ctrl-group-label {
    font-family: 'Space Mono', monospace; font-size: 9px;
    letter-spacing: 3px; text-transform: uppercase; color: #6b7659;
    padding-bottom: 6px; border-bottom: 1px solid rgba(255,255,255,.06);
  }

  .ctrl-row { display: flex; align-items: center; gap: 12px; }
  .ctrl-label {
    font-family: 'Space Mono', monospace; font-size: 10px;
    letter-spacing: 1px; text-transform: uppercase; color: #9aa890;
    width: 72px; flex: none;
  }
  .ctrl-val {
    font-family: 'Space Mono', monospace; font-size: 10px;
    color: #EC8E90; width: 32px; text-align: right; flex: none;
  }

  /* slider */
  input[type=range] {
    -webkit-appearance: none; appearance: none;
    flex: 1; height: 2px; background: #475438; border-radius: 1px; outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 12px; height: 12px;
    border-radius: 50%; background: #EC8E90; cursor: pointer;
    transition: background .2s, transform .15s;
  }
  input[type=range]:hover::-webkit-slider-thumb { background: #f0a6a8; transform: scale(1.2); }
  input[type=range]::-webkit-slider-runnable-track { background: transparent; }

  /* toggle buttons */
  .ctrl-toggles { display: flex; gap: 4px; flex: 1; }
  .ctrl-btn {
    font-family: 'Space Mono', monospace; font-size: 9px;
    letter-spacing: 1px; text-transform: uppercase;
    padding: 4px 8px; border: 1px solid #475438; border-radius: 2px;
    background: transparent; color: #9aa890; cursor: pointer;
    transition: background .18s, color .18s, border-color .18s;
    white-space: nowrap;
  }
  .ctrl-btn:hover { border-color: #6b7659; color: #b9c2ad; }
  .ctrl-btn.active { background: #EC8E90; border-color: #EC8E90; color: #1d2718; }

  @media (max-width: 600px) {
    #ctrl-body { grid-template-columns: 1fr; }
    .ctrl-label { width: 56px; font-size: 9px; }
  }

  /* hamburger menu */
  .vn-burger { display:flex; flex-direction:column; justify-content:center; gap:5px; width:32px; height:32px; padding:6px 4px; margin-left:-4px; background:none; border:none; cursor:pointer; flex:none; }
  .vn-burger span { display:block; height:2px; width:100%; background:#EFEBE6; border-radius:2px; transition:transform .25s, opacity .2s, background .2s; }
  .vn-burger:hover span { background:#EC8E90; }
  .vn-burger.open span:nth-child(1) { transform:translateY(7px) rotate(45deg); }
  .vn-burger.open span:nth-child(2) { opacity:0; }
  .vn-burger.open span:nth-child(3) { transform:translateY(-7px) rotate(-45deg); }
  .vn-menu { position:absolute; top:calc(100% + 8px); left:clamp(24px,7vw,84px); z-index:200; min-width:230px; background:#F6F3ED; border:1px solid #e2dcd4; border-radius:8px; box-shadow:0 16px 44px rgba(40,52,32,.18); padding:8px; display:flex; flex-direction:column; }
  .vn-menu[hidden] { display:none; }
  .vn-menu a { font-family:'Instrument Serif',serif; font-size:21px; line-height:1.1; color:#2E3C24; text-decoration:none; padding:9px 16px; border-radius:6px; transition:background .18s, color .18s; }
  .vn-menu a:hover { background:#EFEBE6; color:#C45F61; }
</style>
</head>
<body>
<div style="display:flex;flex-direction:column;min-height:100vh;padding-bottom:36px;">

  <!-- top bar -->
  <div style="display:flex;align-items:center;justify-content:space-between;gap:18px;padding:26px clamp(24px,7vw,84px);background:#2E3C24;border-bottom:1px solid #44523a;position:relative;">
    <div style="display:flex;align-items:center;gap:16px;"><button class="vn-burger" type="button" aria-label="Menu" aria-controls="vn-menu" aria-expanded="false"><span></span><span></span><span></span></button><a href="index.html" style="font-family:'Instrument Serif',serif;font-size:33px;line-height:1;color:#EFEBE6;text-decoration:none;"><span style="font-style:italic;">Verb</span> <span style="color:#EC8E90;">and</span> Noun</a></div><nav id="vn-menu" class="vn-menu" hidden><a href="pct.html">PCT &rsquo;27</a><a href="photo.html">Photo</a><a href="noise.html">Noise</a><a href="invoice.html">Invoices</a><a href="meditation.html">Meditation</a><a href="tonys.html">Tonys</a><a href="luscious.html">Luscious</a><a href="illusion.html">Illusion of Choice</a></nav>
  </div>

  <!-- interactive surface: translucent canvas fills the area; text rides on top -->
  <main style="position:relative;flex:1;">
    <canvas id="noise-canvas"></canvas>
    <div style="position:relative;z-index:2;padding:56px clamp(24px,7vw,84px) 40px;pointer-events:none;">
      <h1 style="font-family:'Instrument Serif',serif;font-weight:400;font-size:clamp(64px,13vw,160px);line-height:.84;letter-spacing:-1px;color:#2E3C24;">Noise</h1>
      <p id="noise-hint" style="font-family:'Hanken Grotesk',sans-serif;font-weight:400;font-size:20px;color:#8a8578;margin-top:20px;line-height:1.5;transition:opacity .4s;">Move the cursor. Listen.</p>
    </div>
  </main>

  <!-- controls drawer (sits above the footer) -->
  <div id="ctrl-drawer">
    <div id="ctrl-tab">
      <span>settings</span>
      <span id="ctrl-arrow">↑</span>
    </div>
    <div id="ctrl-body">

      <!-- audio -->
      <div class="ctrl-group">
        <div class="ctrl-group-label">Audio</div>

        <div class="ctrl-row">
          <span class="ctrl-label">Volume</span>
          <input type="range" id="c-vol" min="0" max="100" value="60">
          <span class="ctrl-val" id="v-vol">60</span>
        </div>

        <div class="ctrl-row">
          <span class="ctrl-label">Reverb</span>
          <input type="range" id="c-rev" min="0" max="100" value="30">
          <span class="ctrl-val" id="v-rev">30</span>
        </div>

        <div class="ctrl-row">
          <span class="ctrl-label">Wave</span>
          <div class="ctrl-toggles">
            <button class="ctrl-btn active" data-group="wave" data-val="sine">sine</button>
            <button class="ctrl-btn" data-group="wave" data-val="triangle">tri</button>
            <button class="ctrl-btn" data-group="wave" data-val="sawtooth">saw</button>
            <button class="ctrl-btn" data-group="wave" data-val="square">sqr</button>
          </div>
        </div>

        <div class="ctrl-row">
          <span class="ctrl-label">Scale</span>
          <div class="ctrl-toggles">
            <button class="ctrl-btn active" data-group="scale" data-val="penta">penta</button>
            <button class="ctrl-btn" data-group="scale" data-val="major">major</button>
            <button class="ctrl-btn" data-group="scale" data-val="minor">minor</button>
            <button class="ctrl-btn" data-group="scale" data-val="chrom">chrom</button>
          </div>
        </div>
      </div>

      <!-- visual -->
      <div class="ctrl-group">
        <div class="ctrl-group-label">Visual</div>

        <div class="ctrl-row">
          <span class="ctrl-label">Density</span>
          <input type="range" id="c-den" min="12" max="48" value="28">
          <span class="ctrl-val" id="v-den">28</span>
        </div>

        <div class="ctrl-row">
          <span class="ctrl-label">Radius</span>
          <input type="range" id="c-rad" min="40" max="280" value="130">
          <span class="ctrl-val" id="v-rad">130</span>
        </div>

        <div class="ctrl-row">
          <span class="ctrl-label">Speed</span>
          <input type="range" id="c-spd" min="2" max="30" value="12">
          <span class="ctrl-val" id="v-spd">12</span>
        </div>
      </div>

    </div>
  </div>

  <!-- footer -->
  <div style="display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;padding:22px clamp(24px,7vw,84px);background:#2E3C24;border-top:1px solid #44523a;font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:#9aa890;">
    <span>verbandnoun<span style="color:#EC8E90;">.io</span></span>
  </div>

</div>

<script>
(function () {
  // ── state ──
  const P = {
    vol: 0.6,
    rev: 0.3,
    wave: 'sine',
    scale: 'penta',
    spacing: 28,
    radius: 130,
    speed: 0.12,
  };

  const SCALES = {
    penta: [130.81,146.83,164.81,196,220,261.63,293.66,329.63,392,440,523.25,587.33,659.25,784,880],
    major: [130.81,146.83,164.81,174.61,196,220,246.94,261.63,293.66,329.63,349.23,392,440,493.88,523.25,587.33,659.25,698.46,784,880],
    minor: [130.81,146.83,155.56,174.61,196,207.65,233.08,261.63,293.66,311.13,349.23,392,415.30,466.16,523.25,587.33,622.25,698.46,784],
    chrom: [130.81,138.59,146.83,155.56,164.81,174.61,185,196,207.65,220,233.08,246.94,261.63,277.18,293.66,311.13,329.63,349.23,369.99,392,415.30,440,466.16,493.88,523.25],
  };

  // brand-color field — the surface is transparent (page shows through); dots
  // glow these accents only on interaction, and the active hue shifts across the
  // palette as the pointer moves around the page.
  const BRAND = [
    [236,142,144], // coral
    [196, 95, 97], // deep coral
    [111,124, 47], // moss
    [ 63, 90,115], // storm
    [ 86, 74, 84], // plum
  ];
  function brandAt(t) {
    const n = BRAND.length;
    const x = ((((t % 1) + 1) % 1)) * n;
    const i = Math.floor(x) % n, f = x - Math.floor(x);
    const a = BRAND[i], b = BRAND[(i + 1) % n];
    return [a[0] + (b[0] - a[0]) * f, a[1] + (b[1] - a[1]) * f, a[2] + (b[2] - a[2]) * f];
  }

  // ── canvas ──
  const canvas = document.getElementById('noise-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, dots = [];

  function resize() {
    const rect = canvas.parentElement.getBoundingClientRect();
    W = Math.floor(rect.width);
    H = Math.max(Math.floor(rect.height), 240);
    const dpr = window.devicePixelRatio || 1;
    canvas.width = W * dpr; canvas.height = H * dpr;   // backing store at device resolution
    canvas.style.height = H + 'px';                    // CSS height (width stays 100% of parent)
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);            // draw in CSS px; re-applied since width assignment resets it
    buildGrid();
  }

  function buildGrid() {
    dots = [];
    const cols = Math.floor(W / P.spacing);
    const rows = Math.floor(H / P.spacing);
    const offX = (W - (cols - 1) * P.spacing) / 2;
    const offY = (H - (rows - 1) * P.spacing) / 2;
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++)
        dots.push({ x: offX + c * P.spacing, y: offY + r * P.spacing, glow: 0 });
  }

  // ── pointer (mouse + touch + pen, one path) ──
  let mx = -999, my = -999, hasInteracted = false;
  const ripples = [];

  function firstInteraction() {
    if (hasInteracted) return;
    hasInteracted = true; startAudio();
  }
  canvas.addEventListener('pointermove', e => {
    const r = canvas.getBoundingClientRect();
    mx = e.clientX - r.left; my = e.clientY - r.top;
    firstInteraction();
    updateAudio(mx / W, my / H);
  });
  const endPointer = () => { mx = -999; my = -999; stopAudio(); };
  canvas.addEventListener('pointerup', endPointer);
  canvas.addEventListener('pointerleave', endPointer);
  canvas.addEventListener('pointercancel', endPointer);
  canvas.addEventListener('pointerdown', e => {
    const r = canvas.getBoundingClientRect();
    mx = e.clientX - r.left; my = e.clientY - r.top;
    ripples.push({ x: mx, y: my, t: 0 });
    firstInteraction();   // on touch there's no move-before-press; pointerdown is a valid gesture to unlock audio
    if (audioCtx && audioCtx.state === 'suspended' && audioCtx.resume) audioCtx.resume(); // re-unlock if it was suspended
    updateAudio(mx / W, my / H);   // a touch should sound at once, not only while dragging
  });

  // ── render ──
  // hue position for a point — its place across the surface, nudged by the
  // pointer so the whole field shifts brand colors as you move around.
  function huePos(x, y) {
    const ct = (mx >= 0 ? mx / W : 0) + (my >= 0 ? my / H : 0) * 0.5;
    return x / W * 0.55 + y / H * 0.25 + ct * 0.5;
  }

  function render() {
    ctx.clearRect(0, 0, W, H);  // transparent surface — the page shows through

    for (let i = ripples.length - 1; i >= 0; i--) {
      const rp = ripples[i]; rp.t += 0.018;
      const alpha = Math.max(0, 1 - rp.t * 1.1);
      const [r, g, b] = brandAt(huePos(rp.x, rp.y));
      ctx.beginPath();
      ctx.arc(rp.x, rp.y, rp.t * 220, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(${r|0},${g|0},${b|0},${alpha * 0.4})`;
      ctx.lineWidth = 1.5; ctx.stroke();
      if (rp.t > 1) ripples.splice(i, 1);
    }

    if (mx >= 0 && my >= 0) {
      const [r, g, b] = brandAt(huePos(mx, my));
      const grad = ctx.createRadialGradient(mx, my, 0, mx, my, P.radius * 1.4);
      grad.addColorStop(0, `rgba(${r|0},${g|0},${b|0},0.16)`);
      grad.addColorStop(1, `rgba(${r|0},${g|0},${b|0},0)`);
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(mx, my, P.radius * 1.4, 0, Math.PI * 2); ctx.fill();
    }

    for (const d of dots) {
      const dx = d.x - mx, dy = d.y - my;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const target = dist < P.radius ? Math.pow(1 - dist / P.radius, 1.6) : 0;
      d.glow += (target - d.glow) * P.speed;
      const g = d.glow;
      if (g <= 0.01) continue;  // invisible at rest

      const r = 1.5 + g * 4;
      const [cr, cg, cb] = brandAt(huePos(d.x, d.y));

      const halo = ctx.createRadialGradient(d.x, d.y, 0, d.x, d.y, r * 5);
      halo.addColorStop(0, `rgba(${cr|0},${cg|0},${cb|0},${g * 0.5})`);
      halo.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = halo;
      ctx.beginPath(); ctx.arc(d.x, d.y, r * 5, 0, Math.PI * 2); ctx.fill();

      ctx.fillStyle = `rgba(${cr|0},${cg|0},${cb|0},${g * 0.95})`;
      ctx.beginPath(); ctx.arc(d.x, d.y, r, 0, Math.PI * 2); ctx.fill();
    }

    requestAnimationFrame(render);
  }

  // ── audio ──
  let audioCtx, osc, gainNode, filterNode, convolver, dryGain, wetGain, started = false;

  function makeReverb(ctx, seconds = 2.5) {
    const rate = ctx.sampleRate;
    const len = rate * seconds;
    const buf = ctx.createBuffer(2, len, rate);
    for (let ch = 0; ch < 2; ch++) {
      const d = buf.getChannelData(ch);
      for (let i = 0; i < len; i++)
        d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.5);
    }
    const c = ctx.createConvolver(); c.buffer = buf; return c;
  }

  function startAudio() {
    if (started) return;
    // iOS: opt into the 'playback' audio session so the ringer/mute switch
    // doesn't silence us, and volume buttons control it (Safari 16.4+).
    try { if (navigator.audioSession) navigator.audioSession.type = 'playback'; } catch (e) {}
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended' && audioCtx.resume) audioCtx.resume(); // iOS/mobile: unlock within the gesture

    osc = audioCtx.createOscillator();
    osc.type = P.wave;
    osc.frequency.value = SCALES[P.scale][0];

    filterNode = audioCtx.createBiquadFilter();
    filterNode.type = 'lowpass'; filterNode.frequency.value = 1200; filterNode.Q.value = 2;

    gainNode = audioCtx.createGain();
    gainNode.gain.setValueAtTime(0, audioCtx.currentTime);

    convolver = makeReverb(audioCtx);
    dryGain = audioCtx.createGain(); dryGain.gain.value = 1 - P.rev;
    wetGain = audioCtx.createGain(); wetGain.gain.value = P.rev;

    osc.connect(filterNode);
    filterNode.connect(gainNode);
    gainNode.connect(dryGain); dryGain.connect(audioCtx.destination);
    gainNode.connect(convolver); convolver.connect(wetGain); wetGain.connect(audioCtx.destination);

    osc.start();
    started = true;
  }

  function updateAudio(nx, ny) {
    if (!started || !audioCtx) return;
    const scale = SCALES[P.scale];
    const idx = Math.min(scale.length - 1, Math.floor(nx * scale.length));
    const vol = Math.max(0, (1 - ny) * P.vol * 0.3);
    const now = audioCtx.currentTime;
    osc.frequency.setTargetAtTime(scale[idx], now, 0.06);
    gainNode.gain.setTargetAtTime(vol, now, 0.08);
  }

  function stopAudio() {
    if (!started || !gainNode) return;
    gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.12);
  }

  // ── controls drawer ──
  const drawer = document.getElementById('ctrl-drawer');
  document.getElementById('ctrl-tab').addEventListener('click', () => { drawer.classList.toggle('open'); resize(); });

  function bindSlider(id, valId, onchange) {
    const el = document.getElementById(id);
    const disp = document.getElementById(valId);
    el.addEventListener('input', () => { disp.textContent = el.value; onchange(+el.value); });
  }

  bindSlider('c-vol', 'v-vol', v => { P.vol = v / 100; });
  bindSlider('c-rev', 'v-rev', v => {
    P.rev = v / 100;
    if (dryGain) { dryGain.gain.value = 1 - P.rev; wetGain.gain.value = P.rev; }
  });
  bindSlider('c-den', 'v-den', v => { P.spacing = v; buildGrid(); });
  bindSlider('c-rad', 'v-rad', v => { P.radius = v; });
  bindSlider('c-spd', 'v-spd', v => { P.speed = v / 100; });

  document.querySelectorAll('.ctrl-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const group = btn.dataset.group, val = btn.dataset.val;
      document.querySelectorAll(`[data-group="${group}"]`).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (group === 'wave') { P.wave = val; if (osc) osc.type = val; }
      if (group === 'scale') { P.scale = val; }
    });
  });

  window.addEventListener('resize', resize);
  resize();
  render();
})();
</script>
<script>
(function () {
  var b = document.querySelector('.vn-burger'), m = document.getElementById('vn-menu');
  if (!b || !m) return;
  function set(open) { m.hidden = !open; b.classList.toggle('open', open); b.setAttribute('aria-expanded', String(open)); }
  b.addEventListener('click', function (e) { e.stopPropagation(); set(m.hidden); });
  document.addEventListener('click', function (e) { if (!m.hidden && !b.contains(e.target) && !m.contains(e.target)) set(false); });
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') set(false); });
})();
</script>
</body>
</html>
