<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'">
<title>Tonys · verbandnoun.io</title>
<link rel="icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Hanken+Grotesk:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #EFEBE6; font-family: 'Hanken Grotesk', sans-serif; color: #283420; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
  ::selection { background: #EC8E90; color: #2E3C24; }
  .back-link { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 1px; text-transform: lowercase; color: #8a8578; text-decoration: none; transition: color .22s; }
  .back-link:hover { color: #C45F61; }

  /* transparent full-viewport overlay — the Tonys fly over the whole page */
  #tony-canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 40; display: block; }

  /* ── controls drawer (reused from noise) ── */
  #ctrl-drawer {
    position: relative; z-index: 50;
    background: rgba(29,39,24,.92);
    backdrop-filter: blur(12px);
    border-top: 1px solid rgba(255,255,255,.08);
  }
  #ctrl-tab {
    height: 36px; display: flex; align-items: center; justify-content: center;
    gap: 8px; cursor: pointer;
    font-family: 'Space Mono', monospace; font-size: 12.5px; font-weight: 700;
    letter-spacing: 2.5px; text-transform: uppercase; color: #EC8E90;
    user-select: none; transition: color .2s;
  }
  #ctrl-tab:hover { color: #f0a6a8; }
  #ctrl-arrow { transition: transform .38s cubic-bezier(.2,.7,.2,1); display: inline-block; }
  #ctrl-drawer.open #ctrl-arrow { transform: rotate(180deg); }
  #ctrl-body { padding: 0 clamp(20px,5vw,64px); max-width: 620px; display: flex; flex-direction: column; gap: 22px; max-height: 0; overflow: hidden; transition: max-height .42s cubic-bezier(.2,.7,.2,1), padding .42s cubic-bezier(.2,.7,.2,1); }
  #ctrl-drawer.open #ctrl-body { max-height: 80vh; padding: 16px clamp(20px,5vw,64px) 24px; overflow-y: auto; }
  .ctrl-group { display: flex; flex-direction: column; gap: 14px; }
  .ctrl-group-label {
    font-family: 'Space Mono', monospace; font-size: 9px;
    letter-spacing: 3px; text-transform: uppercase; color: #6b7659;
    padding-bottom: 6px; border-bottom: 1px solid rgba(255,255,255,.06);
  }
  .ctrl-row { display: flex; align-items: center; gap: 12px; }
  .ctrl-label {
    font-family: 'Space Mono', monospace; font-size: 10px;
    letter-spacing: 1px; text-transform: uppercase; color: #9aa890;
    width: 72px; flex: none;
  }
  .ctrl-val {
    font-family: 'Space Mono', monospace; font-size: 10px;
    color: #EC8E90; width: 44px; text-align: right; flex: none;
  }
  input[type=range] {
    -webkit-appearance: none; appearance: none;
    flex: 1; height: 2px; background: #475438; border-radius: 1px; outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 12px; height: 12px;
    border-radius: 50%; background: #EC8E90; cursor: pointer;
    transition: background .2s, transform .15s;
  }
  input[type=range]:hover::-webkit-slider-thumb { background: #f0a6a8; transform: scale(1.2); }
  input[type=range]::-webkit-slider-runnable-track { background: transparent; }

  /* ── image picker (which Tonys are in the mix) ── */
  .pick-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .pick {
    width: 40px; height: 40px; padding: 0; border: 2px solid transparent; border-radius: 5px;
    background: #475438; overflow: hidden; cursor: pointer; opacity: .32;
    transition: opacity .18s, border-color .18s, transform .12s;
  }
  .pick:hover { transform: scale(1.08); }
  .pick.on { opacity: 1; border-color: #EC8E90; }
  .pick img { width: 100%; height: 100%; object-fit: cover; display: block; pointer-events: none; }

  /* ── audio control (nearly transparent, upper-right, in line with the hero) ── */
  .audio-ctl { position: relative; z-index: 45; display: flex; align-items: center; gap: 10px; flex: none; opacity: .6; transition: opacity .25s; }
  .audio-ctl:hover { opacity: .98; }
  .audio-ctl.playing { opacity: .82; }
  /* discoverability while paused: salmon rings radiate ~an inch outward from the button + a "press play" callout on hover */
  @keyframes audio-ripple { 0% { transform: scale(1); opacity: .6; } 100% { transform: scale(6); opacity: 0; } }
  .audio-ctl:not(.playing) .audio-btn { position: relative; }
  .audio-ctl:not(.playing) .audio-btn::before,
  .audio-ctl:not(.playing) .audio-btn::after {
    content: ''; position: absolute; inset: 0; border-radius: 50%;
    border: 1.5px solid #C45F61; pointer-events: none;
    animation: audio-ripple 2.8s ease-out infinite;
  }
  .audio-ctl:not(.playing) .audio-btn::after { border-color: #6F7C2F; animation-delay: 1.4s; }
  .audio-tip {
    position: absolute; top: calc(100% + 9px); right: 2px;
    font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
    color: #C45F61; white-space: nowrap; opacity: 0; transform: translateY(-4px); pointer-events: none;
    transition: opacity .25s, transform .25s;
  }
  .audio-ctl:not(.playing):hover .audio-tip { opacity: 1; transform: translateY(0); }
  .audio-btn {
    width: 34px; height: 34px; border-radius: 50%; flex: none;
    border: 1px solid #8a8578; background: transparent; color: #2E3C24;
    font-family: 'Space Mono', monospace; font-size: 11px; line-height: 1; cursor: pointer;
    display: flex; align-items: center; justify-content: center; padding-left: 1px;
    transition: border-color .2s, color .2s;
  }
  .audio-btn:hover { border-color: #C45F61; color: #C45F61; }
  .audio-vol { -webkit-appearance: none; appearance: none; width: 70px; height: 2px; background: #cfc7bb; border-radius: 1px; outline: none; cursor: pointer; }
  .audio-vol::-webkit-slider-thumb { -webkit-appearance: none; width: 11px; height: 11px; border-radius: 50%; background: #C45F61; cursor: pointer; }

  @media (max-width: 600px) { .ctrl-label { width: 56px; font-size: 9px; } .audio-vol { display: none; } }
</style>
</head>
<body>
<canvas id="tony-canvas"></canvas>

<div style="display:flex;flex-direction:column;min-height:100vh;">

  <!-- top bar -->
  <div style="display:flex;align-items:center;justify-content:space-between;gap:18px;padding:26px clamp(24px,7vw,84px);background:#2E3C24;border-bottom:1px solid #44523a;">
    <a href="index.html" style="font-family:'Instrument Serif',serif;font-size:22px;line-height:1;color:#EFEBE6;text-decoration:none;"><span style="font-style:italic;">Verb</span> <span style="color:#EC8E90;">and</span> Noun</a>
  </div>

  <!-- header -->
  <div style="position:relative;z-index:45;padding:56px clamp(24px,7vw,84px) 8px;display:flex;justify-content:space-between;align-items:flex-start;gap:20px;">
    <div>
      <h1 style="font-family:'Instrument Serif',serif;font-weight:400;font-size:clamp(64px,13vw,160px);line-height:.84;letter-spacing:-1px;color:#2E3C24;">Tonys</h1>
      <p style="font-family:'Hanken Grotesk',sans-serif;font-weight:400;font-size:20px;color:#C45F61;margin-top:20px;line-height:1.5;">Night of 1,000 Tonys.</p>
    </div>
    <div class="audio-ctl" id="audio-ctl">
      <span class="audio-tip">press play</span>
      <button id="audio-btn" class="audio-btn" type="button" aria-label="play soundtrack">▶</button>
      <input type="range" id="audio-vol" class="audio-vol" min="0" max="100" value="70" aria-label="volume">
    </div>
  </div>
  <audio id="tony-audio" src="assets/opt/tony-audio.m4a" loop preload="auto"></audio>

  <div style="flex:1;"></div>

  <!-- controls (sits above the footer) -->
  <div id="ctrl-drawer">
    <div id="ctrl-tab"><span>controls</span><span id="ctrl-arrow">↑</span></div>
    <div id="ctrl-body">
      <div class="ctrl-group">
        <div class="ctrl-group-label">Confetti</div>
        <div class="ctrl-row">
          <span class="ctrl-label">Tonys</span>
          <input type="range" id="c-count" min="1" max="2000" value="1050">
          <span class="ctrl-val" id="v-count">1050</span>
        </div>
        <div class="ctrl-row">
          <span class="ctrl-label">Speed</span>
          <input type="range" id="c-speed" min="1" max="30" value="5">
          <span class="ctrl-val" id="v-speed">5</span>
        </div>
      </div>
      <div class="ctrl-group">
        <div class="ctrl-group-label">Which Tonys</div>
        <div class="pick-row" id="img-picker"></div>
      </div>
    </div>
  </div>

  <!-- footer -->
  <div style="display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;padding:22px clamp(24px,7vw,84px);background:#2E3C24;border-top:1px solid #44523a;font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:#9aa890;">
    <span>verbandnoun<span style="color:#EC8E90;">.io</span></span>
  </div>

</div>

<script>
(function () {
  const canvas = document.getElementById('tony-canvas');
  const ctx = canvas.getContext('2d');
  let W = 0, H = 0;

  function resize() {
    // backing store from the canvas's real rendered size (clientWidth is a reliable layout
    // property; window.innerWidth can briefly lie). Display size is CSS 100vw/100vh.
    const dpr = window.devicePixelRatio || 1;
    const w = canvas.clientWidth, h = canvas.clientHeight;
    if (w < 2 || h < 2) return;
    W = w; H = h;
    canvas.width = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  // ── state ──
  const P = { count: 1050, speed: 5 };
  const GRAVITY = 0.3;
  const tonys = [];
  let fireSide = 0;
  const rand = (a, b) => a + Math.random() * (b - a);

  // ── the cast of Tonys (transparent cutouts) ──
  const SRCS = ['tony.png', 'IMG_1777.PNG', 'IMG_1778.PNG', 'IMG_1779.PNG', 'IMG_1780.PNG',
                'IMG_1781.PNG', 'IMG_1782.PNG', 'IMG_1784.PNG', 'IMG_1785.PNG',
                'IMG_1788.PNG', 'IMG_1789.PNG', 'IMG_1790.PNG'];
  const sprites = SRCS.map(src => ({ src, canvas: null, aspect: 1, enabled: true, ready: false }));
  let started = false, readyCount = 0;

  function pickSprite() {
    const e = [];
    for (let i = 0; i < sprites.length; i++) if (sprites[i].enabled && sprites[i].ready) e.push(i);
    return e.length ? e[(Math.random() * e.length) | 0] : 0;
  }

  // load + pre-render each cutout into a small offscreen canvas for fast drawing
  sprites.forEach((s) => {
    const im = new Image();
    im.onload = () => {
      s.aspect = im.naturalHeight / im.naturalWidth;
      const max = 176;
      let cw, ch;
      if (s.aspect <= 1) { cw = max; ch = Math.max(1, Math.round(max * s.aspect)); }
      else { ch = max; cw = Math.max(1, Math.round(max / s.aspect)); }
      const off = document.createElement('canvas'); off.width = cw; off.height = ch;
      off.getContext('2d').drawImage(im, 0, 0, cw, ch);
      s.canvas = off; s.ready = true; readyCount++;
      if (!started) start();
      if (readyCount === sprites.length) for (const t of tonys) t.si = pickSprite(); // mix once all in
    };
    im.src = 'assets/opt/' + s.src;
  });

  // ── a Tony fired from a side cannon (left = -1, right = +1) ──
  function fire() {
    const side = (fireSide++ % 2 === 0) ? -1 : 1;
    const size = rand(36, 72);
    const vx = rand(13, 24);                            // strong inward shot, across the page
    return {
      size, si: pickSprite(),
      x: side === -1 ? -size : W + size,
      y: rand(H * 0.35, H * 0.9),
      vx: side === -1 ? vx : -vx,
      vy: -rand(5, 13),                                 // gentle upward arc
      rot: rand(0, Math.PI * 2),
      vrot: rand(-0.16, 0.16),
      rest: 0,
    };
  }

  function setCount(n) {
    n = Math.max(0, Math.round(n));
    while (tonys.length < n) tonys.push(fire());
    if (tonys.length > n) tonys.length = n;
  }

  function step() {
    const spd = P.speed / 10;
    for (const t of tonys) {
      t.vy += GRAVITY * spd;
      t.x += t.vx * spd;
      t.y += t.vy * spd;
      t.rot += t.vrot * spd;
      const r = t.size / 2;
      // reflect only when moving INTO a wall, so the fly-in from off-screen isn't snapped back
      if (t.x < r) { t.x = r; if (t.vx < 0) t.vx = -t.vx * 0.8; }
      else if (t.x > W - r) { t.x = W - r; if (t.vx > 0) t.vx = -t.vx * 0.8; }
      if (t.y < r) { t.y = r; if (t.vy < 0) t.vy = -t.vy * 0.7; }
      if (t.y > H - r) {                                // floor
        t.y = H - r;
        if (t.vy > 0) t.vy = -t.vy * 0.7;
        t.vx *= 0.96; t.vrot *= 0.9;
      }
      // recycle a Tony that has settled at the bottom — re-fire (with a fresh random face)
      if (t.y > H - r - 2 && Math.abs(t.vy) < 1.5 && Math.abs(t.vx) < 0.4) {
        if (++t.rest > 40) Object.assign(t, fire());
      } else { t.rest = 0; }
    }
  }

  function render() {
    ctx.clearRect(0, 0, W, H);
    for (const t of tonys) {
      const s = sprites[t.si];
      if (!s || !s.canvas) continue;
      let dw, dh;                                        // normalise so each cutout fits a size×size box
      if (s.aspect <= 1) { dw = t.size; dh = t.size * s.aspect; }
      else { dh = t.size; dw = t.size / s.aspect; }
      ctx.save();
      ctx.translate(t.x, t.y);
      ctx.rotate(t.rot);
      ctx.drawImage(s.canvas, -dw / 2, -dh / 2, dw, dh);
      ctx.restore();
    }
    step();
    requestAnimationFrame(render);
  }

  function start() {
    if (started) return; started = true;
    resize();
    if (W < 50 || H < 50) { W = Math.max(320, document.documentElement.clientWidth || 1200); H = Math.max(320, document.documentElement.clientHeight || 800); }
    render();
    setTimeout(() => setCount(P.count), 7000);   // hold the Tonys back, then let them flow in after 7s
  }
  window.addEventListener('resize', resize);
  if (window.ResizeObserver) new ResizeObserver(resize).observe(canvas);

  // ── controls ──
  const drawer = document.getElementById('ctrl-drawer');
  document.getElementById('ctrl-tab').addEventListener('click', () => drawer.classList.toggle('open'));
  function bindSlider(id, valId, onchange) {
    const el = document.getElementById(id), disp = document.getElementById(valId);
    el.addEventListener('input', () => { disp.textContent = el.value; onchange(+el.value); });
  }
  bindSlider('c-count', 'v-count', v => { P.count = v; setCount(v); });
  bindSlider('c-speed', 'v-speed', v => { P.speed = v; });

  // image picker — toggle which Tonys are in the mix (all on to start; keep at least one)
  const picker = document.getElementById('img-picker');
  sprites.forEach((s, i) => {
    const b = document.createElement('button');
    b.className = 'pick on'; b.type = 'button'; b.title = 'toggle this Tony';
    const im = document.createElement('img'); im.src = 'assets/opt/' + s.src; im.alt = '';
    b.appendChild(im);
    b.addEventListener('click', () => {
      if (s.enabled && sprites.filter(x => x.enabled).length <= 1) return; // never zero
      s.enabled = !s.enabled;
      b.classList.toggle('on', s.enabled);
      if (!s.enabled) for (const t of tonys) if (t.si === i) t.si = pickSprite();
    });
    picker.appendChild(b);
  });

  // ── audio: starts OFF. Click play to start it (gentle 1.2s fade-in). The pulsing button
  //    + "press play" callout make the control discoverable; no autoplay. ──
  const audio = document.getElementById('tony-audio');
  const aCtl = document.getElementById('audio-ctl');
  const aBtn = document.getElementById('audio-btn');
  const aVol = document.getElementById('audio-vol');
  let targetVol = (+aVol.value) / 100;
  let fadeActive = false, fadeStart = 0;

  function fadeIn(ts) {
    if (!fadeActive) return;
    if (!fadeStart) fadeStart = ts;
    const k = Math.min(1, (ts - fadeStart) / 1200);
    audio.volume = targetVol * k;
    if (k < 1) requestAnimationFrame(fadeIn); else fadeActive = false;
  }
  aBtn.addEventListener('click', () => {
    if (audio.paused) {
      audio.volume = 0; fadeActive = true; fadeStart = 0;
      audio.play().then(() => requestAnimationFrame(fadeIn)).catch(() => {});
    } else { audio.pause(); }
  });
  aVol.addEventListener('input', () => { targetVol = (+aVol.value) / 100; fadeActive = false; audio.volume = targetVol; });
  audio.addEventListener('play', () => { aBtn.textContent = '❚❚'; aCtl.classList.add('playing'); });
  audio.addEventListener('pause', () => { aBtn.textContent = '▶'; aCtl.classList.remove('playing'); });
})();
</script>
</body>
</html>
