  .toast.show { opacity:1; transform:translateX(-50%) translateY(-4px); }
  .toast.err { background:#C24230; color:#fff; }

  .kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-bottom:26px; }
  .kpi { background:var(--surface); border:1px solid var(--line); border-radius:4px; padding:18px; }
  .kpi .v { font-size:28px; font-weight:600; letter-spacing:-.5px; font-variant-numeric:tabular-nums; margin-top:6px; }
  .kpi.accent .v { color:var(--accent); }
  .chart-card { background:var(--surface); border:1px solid var(--line); border-radius:4px; padding:20px; margin-bottom:26px; }
  .timer-box { display:flex; align-items:center; gap:14px; flex-wrap:wrap; background:var(--surface); border:1px solid var(--line); border-radius:4px; padding:14px 18px; margin-bottom:20px; }
  .timer-clock { font-family:'Space Mono',monospace; font-size:24px; font-variant-numeric:tabular-nums; letter-spacing:1px; }

  .gate { max-width:420px; margin:8vh auto; text-align:center; }
  .gate h1 { font-family:'Instrument Serif',serif; font-weight:400; font-size:48px; letter-spacing:0; margin-bottom:10px; }
  .gate p { color:var(--soft); margin-bottom:26px; }
  .gate .field { text-align:left; margin-bottom:16px; }
  .banner { background:var(--warn-bg); border:1px solid var(--warn-bd); border-radius:4px; padding:16px 18px; margin-bottom:24px; font-size:14px; color:var(--warn-t); }
  .banner code { font-family:'Space Mono',monospace; font-size:12.5px; background:rgba(0,0,0,.07); padding:1px 5px; border-radius:3px; }
  @media (max-width:640px){ th.hide-sm, td.hide-sm { display:none; } }

  /* hamburger menu */
  .vn-burger { display:flex; flex-direction:column; justify-content:center; gap:5px; width:32px; height:32px; padding:6px 4px; margin-left:-4px; background:none; border:none; cursor:pointer; flex:none; }
  .vn-burger span { display:block; height:2px; width:100%; background:#EFEBE6; border-radius:2px; transition:transform .25s, opacity .2s, background .2s; }
  .vn-burger:hover span { background:#EC8E90; }
  .vn-burger.open span:nth-child(1) { transform:translateY(7px) rotate(45deg); }
  .vn-burger.open span:nth-child(2) { opacity:0; }
  .vn-burger.open span:nth-child(3) { transform:translateY(-7px) rotate(-45deg); }
  .vn-menu { position:absolute; top:calc(100% + 8px); left:clamp(24px,7vw,84px); z-index:200; min-width:230px; background:#F6F3ED; border:1px solid #e2dcd4; border-radius:8px; box-shadow:0 16px 44px rgba(40,52,32,.18); padding:8px; display:flex; flex-direction:column; }

  .vn-menu a:hover { background:#EFEBE6; color:#C45F61; }

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.108.2';

/* ===== CONFIG (your Supabase project) ===================================== */
const SUPABASE_URL  = 'https://rstrkigjfeuagklnauep.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJzdHJraWdqZmV1YWdrbG5hdWVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMDgxMjAsImV4cCI6MjA5NzY4NDEyMH0.9G-oT12P79lcD5XcNsvezJY6XeDMRbBFZLNtGOAkJUU';
const configured = SUPABASE_URL.startsWith('http') && !SUPABASE_ANON.startsWith('YOUR_');
const sb = configured ? createClient(SUPABASE_URL, SUPABASE_ANON) : null;

/* ===== helpers ============================================================ */
const app = document.getElementById('app');
const $ = (id) => document.getElementById(id);
function el(tag, attrs = {}, ...kids) {
  const n = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (v == null || v === false) continue;
    if (k === 'class') n.className = v;
    else if (k === 'html') n.innerHTML = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(n.style, v);
    else if (k.startsWith('on') && typeof v === 'function') n.addEventListener(k.slice(2), v);
    else if (k in n && k !== 'list') { try { n[k] = v; } catch { n.setAttribute(k, v); } }
    else n.setAttribute(k, v);
  }
  for (const kid of kids.flat()) {
    if (kid == null || kid === false) continue;
    n.appendChild(typeof kid === 'object' ? kid : document.createTextNode(String(kid)));
  }
  return n;
}
const div = (a, ...k) => el('div', a, ...k);
const field = (lbl, node) => div({ class: 'field' }, el('span', { class: 'label' }, lbl), node);

let toastTimer;
function toast(msg, isErr = false) {
  const t = $('toast'); t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' err' : '');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => (t.className = 'toast'), 3200);
}
function fail(label, e) { console.error(label, e); toast(label + ': ' + (e?.message || e), true); }

const today = () => new Date().toISOString().slice(0, 10);
const monthKey = (d) => (d || '').slice(0, 7);
function addToDate(dateStr, cadence) {
  const d = new Date(dateStr + 'T00:00:00');
  if (cadence === 'weekly') d.setDate(d.getDate() + 7);
  else if (cadence === 'quarterly') d.setMonth(d.getMonth() + 3);
  else d.setMonth(d.getMonth() + 1);
  return d.toISOString().slice(0, 10);
}
function fmtMoney(n, code) {
  const v = Number(n) || 0; const c = code || ccy();
  try { return new Intl.NumberFormat(undefined, { style: 'currency', currency: c }).format(v); }
  catch { return c + ' ' + v.toFixed(2); }
}
const num = (x) => Number(x) || 0;
const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

/* ===== state ============================================================== */
const state = {
  session: null, tab: 'dashboard', settings: null,
  clients: [], projects: [], time: [], expenses: [], invoices: [], payments: [], recurring: [],
  editing: null,                 // {kind, id}
  filterClient: '', search: '', dateFrom: '', dateTo: '',
  invFilter: 'all',              // all | invoice | estimate | unpaid | overdue
  invoiceDraft: null,
  timer: null,                   // {startMs, clientId, projectId, desc}
};
const clientById = (id) => state.clients.find(c => c.id === id);
const clientName = (id) => clientById(id)?.name || '—';
const projectById = (id) => state.projects.find(p => p.id === id);
const projectName = (id) => projectById(id)?.name || '';
const ccy = () => state.settings?.currency || 'USD';
const clientCcy = (id) => clientById(id)?.currency || ccy();
const paidFor = (invId) => state.payments.filter(p => p.invoice_id === invId).reduce((s, p) => s + num(p.amount), 0);
function invStatus(inv) {
  if (inv.doc_type === 'estimate') return inv.status || 'draft';
  const bal = num(inv.total) - paidFor(inv.id);
  if (bal <= 0.005 && num(inv.total) > 0) return 'paid';
  if (paidFor(inv.id) > 0) return 'partial';
  if (inv.due_date && inv.due_date < today()) return 'overdue';
  return 'unpaid';
}

/* ===== theme ============================================================== */
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('inv-theme', t);
}
$('theme-btn').addEventListener('click', () =>
  applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));
applyTheme(localStorage.getItem('inv-theme') || 'light');

/* ===== auth =============================================================== */
async function initAuth() {
  if (!configured) return renderConfigGate();
  const { data } = await sb.auth.getSession();
  state.session = data.session;
  sb.auth.onAuthStateChange((_e, s) => { state.session = s; s ? loadAll() : renderApp(); });
  state.session ? await loadAll() : renderApp();
}
async function signIn(email) {
  const { error } = await sb.auth.signInWithOtp({ email, options: { emailRedirectTo: location.href.split('#')[0] } });
  if (error) return fail('Sign-in failed', error);
  toast('Magic link sent — check your email.');
}
const signOut = async () => { await sb.auth.signOut(); state.session = null; renderApp(); };

/* ===== data =============================================================== */
async function loadAll() {
  if (!state.session) return renderApp();
  try {
    await ensureSettings();
    const q = (t, ...o) => { let r = sb.from(t).select('*'); o.forEach(([c, a]) => r = r.order(c, a)); return r; };
    const [c, p, t, e, i, pay, rec] = await Promise.all([
      q('clients', ['name', {}]),
      q('projects', ['name', {}]),
      q('time_entries', ['entry_date', { ascending: false }]),
      q('expenses', ['entry_date', { ascending: false }]),
      q('invoices', ['issue_date', { ascending: false }]),
      q('payments', ['paid_date', { ascending: false }]),
      q('recurring_templates', ['name', {}]),
    ]);
    for (const r of [c, p, t, e, i, pay, rec]) if (r.error) throw r.error;
    state.clients = c.data; state.projects = p.data; state.time = t.data;
    state.expenses = e.data; state.invoices = i.data; state.payments = pay.data; state.recurring = rec.data;
    buildDescList();
    renderApp();
  } catch (err) { fail('Load failed', err); }
}
async function ensureSettings() {
  const uid = state.session.user.id;
  let { data, error } = await sb.from('settings').select('*').eq('user_id', uid).maybeSingle();
  if (error) throw error;
  if (!data) { const r = await sb.from('settings').insert({ user_id: uid }).select().single(); if (r.error) throw r.error; data = r.data; }
  state.settings = data;
}
function buildDescList() {
  const set = new Set();
  state.time.forEach(t => t.description && set.add(t.description));
  state.expenses.forEach(x => x.description && set.add(x.description));
  const dl = $('desc-list'); dl.innerHTML = '';
  [...set].slice(0, 200).forEach(d => dl.appendChild(el('option', { value: d })));
}
// generic table helpers
async function del(table, id, msg = 'Deleted') {
  const { error } = await sb.from(table).delete().eq('id', id);
  if (error) return fail('Delete failed', error);
  toast(msg); loadAll();
}
async function update(table, id, patch, msg = 'Saved') {
  const { error } = await sb.from(table).update(patch).eq('id', id);
  if (error) return fail('Update failed', error);
  toast(msg); state.editing = null; loadAll();
}
async function insert(table, row, msg = 'Added') {
  const { error } = await sb.from(table).insert(row);
  if (error) return fail('Add failed', error);
  toast(msg); loadAll();
}

/* ===== root render ======================================================== */
function renderApp() {
  app.innerHTML = ''; $('user-bar').textContent = '';
  if (!configured) return renderConfigGate();
  if (!state.session) return renderSignInGate();
  const ub = $('user-bar');
  ub.appendChild(el('span', { style: { cursor: 'pointer' }, onclick: signOut }, state.session.user.email + ' · sign out'));

  const tabs = [['dashboard', 'Dashboard'], ['time', 'Time'], ['expenses', 'Expenses'],
    ['clients', 'Clients'], ['projects', 'Projects'], ['invoices', 'Invoices'],
    ['reports', 'Reports'], ['settings', 'Settings']];
  app.appendChild(div({ class: 'tabs' }, tabs.map(([id, lbl]) =>
    el('button', { class: 'tab' + (state.tab === id ? ' active' : ''),
      onclick: () => { state.tab = id; state.editing = null; renderApp(); } }, lbl))));

  const body = div({ id: 'tab-body' });
  app.appendChild(body);
  ({ dashboard: renderDashboard, time: renderTime, expenses: renderExpenses, clients: renderClients,
    projects: renderProjects, invoices: renderInvoices, reports: renderReports, settings: renderSettings
  })[state.tab](body);
}

/* ===== shared selects ===================================================== */
function clientSelect(value, onchange, opts = {}) {
  const s = el('select', { onchange: e => onchange(e.target.value) });
  s.appendChild(el('option', { value: '' }, opts.includeAll ? 'All clients' : '— client —'));
  for (const c of state.clients) { const o = el('option', { value: c.id }, c.name); if (c.id === value) o.selected = true; s.appendChild(o); }
  return s;
}
function projectSelect(clientId, value, onchange) {
  const s = el('select', { onchange: e => onchange(e.target.value) });
  s.appendChild(el('option', { value: '' }, '— no project —'));
  state.projects.filter(p => !p.archived && (!clientId || p.client_id === clientId))
    .forEach(p => { const o = el('option', { value: p.id }, p.name); if (p.id === value) o.selected = true; s.appendChild(o); });
  return s;
}

/* ===== DASHBOARD ========================================================== */
function renderDashboard(root) {
  root.appendChild(el('div', { class: 'section-title' }, 'Dashboard'));
  root.appendChild(el('div', { class: 'section-sub' }, 'Your practice at a glance.'));

  const realInv = state.invoices.filter(i => i.doc_type !== 'estimate');
  let outstanding = 0;
  realInv.forEach(i => { const bal = num(i.total) - paidFor(i.id); if (bal > 0) outstanding += bal; });
  const thisMonth = monthKey(today());
  const paidThisMonth = state.payments.filter(p => monthKey(p.paid_date) === thisMonth).reduce((s, p) => s + num(p.amount), 0);
  const unbilled = state.time.filter(t => t.billable && !t.invoice_id).reduce((s, t) => s + num(t.hours) * num(t.rate), 0)
    + state.expenses.filter(x => x.billable && !x.invoice_id).reduce((s, x) => s + num(x.amount), 0);
  // hours this week
  const weekAgo = new Date(Date.now() - 6 * 864e5).toISOString().slice(0, 10);
  const hoursWeek = state.time.filter(t => t.entry_date >= weekAgo).reduce((s, t) => s + num(t.hours), 0);

  root.appendChild(div({ class: 'kpis' },
    kpi('Outstanding', fmtMoney(outstanding), true),
    kpi('Paid this month', fmtMoney(paidThisMonth)),
    kpi('Unbilled value', fmtMoney(unbilled)),
    kpi('Hours, last 7 days', hoursWeek.toFixed(2))));

  // income last 6 months (from payments)
  const months = [];
  const base = new Date(today() + 'T00:00:00'); base.setDate(1);
  for (let i = 5; i >= 0; i--) { const d = new Date(base); d.setMonth(d.getMonth() - i); months.push(d.toISOString().slice(0, 7)); }
  const incomeByMonth = months.map(m => ({ label: m.slice(5), value: state.payments.filter(p => monthKey(p.paid_date) === m).reduce((s, p) => s + num(p.amount), 0) }));
  root.appendChild(div({ class: 'chart-card' }, el('div', { class: 'label', style: { marginBottom: '12px' } }, 'Income · last 6 months'), barChart(incomeByMonth)));

  // overdue
  const overdue = realInv.filter(i => invStatus(i) === 'overdue');
  root.appendChild(el('div', { class: 'label', style: { margin: '6px 0 10px' } }, 'Overdue invoices'));
  if (!overdue.length) root.appendChild(div({ class: 'empty' }, 'Nothing overdue. 🎉'));
  else root.appendChild(tblScroll(el('table', {}, el('thead', {}, el('tr', {},
    el('th', {}, 'Number'), el('th', {}, 'Client'), el('th', {}, 'Due'), el('th', { class: 'num' }, 'Balance'))),
    el('tbody', {}, overdue.map(i => el('tr', {},
      el('td', { class: 'mono' }, i.invoice_number), el('td', {}, clientName(i.client_id)),
      el('td', { class: 'mono' }, i.due_date || '—'),
      el('td', { class: 'num' }, fmtMoney(num(i.total) - paidFor(i.id), i.currency))))))));
}
function kpi(label, value, accent) { return div({ class: 'kpi' + (accent ? ' accent' : '') }, el('div', { class: 'label' }, label), el('div', { class: 'v' }, value)); }
function tblScroll(table) { return div({ class: 'tbl-scroll' }, table); }

function barChart(items) {
  const W = 600, H = 160, pad = 24, bw = (W - pad * 2) / items.length;
  const max = Math.max(1, ...items.map(i => i.value));
  const svg = el('div', { html: '' });
  let bars = '';
  items.forEach((it, i) => {
    const h = (it.value / max) * (H - pad * 2);
    const x = pad + i * bw, y = H - pad - h;
    bars += `<rect x="${x + bw * 0.15}" y="${y}" width="${bw * 0.7}" height="${h}" rx="2" fill="var(--accent)"/>`;
    bars += `<text x="${x + bw / 2}" y="${H - pad + 14}" text-anchor="middle" font-family="Space Mono,monospace" font-size="9" fill="var(--muted)">${esc(it.label)}</text>`;
    if (it.value) bars += `<text x="${x + bw / 2}" y="${y - 5}" text-anchor="middle" font-family="Space Mono,monospace" font-size="9" fill="var(--soft)">${Math.round(it.value)}</text>`;
  });
  svg.innerHTML = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">${bars}</svg>`;
  return svg;
}

function renderTimer(root) {
  const box = div({ class: 'timer-box' });
  const clock = el('span', { class: 'timer-clock' }, '00:00:00');
  const fmt = (ms) => { const s = Math.floor(ms / 1000); return [s / 3600, (s % 3600) / 60, s % 60].map(x => String(Math.floor(x)).padStart(2, '0')).join(':'); };
  let iv;
  const tick = () => { if (state.timer) clock.textContent = fmt(Date.now() - state.timer.startMs); };
  if (state.timer) { tick(); iv = setInterval(tick, 1000); }
  const startBtn = el('button', { class: 'btn sm', onclick: () => {
    state.timer = { startMs: Date.now() }; localStorage.setItem('inv-timer', JSON.stringify(state.timer)); renderApp();
  } }, '▶ Start timer');
  const stopBtn = el('button', { class: 'btn sm', onclick: () => {
    const hrs = (Date.now() - state.timer.startMs) / 3600000; clearInterval(iv);
    state.timer = null; localStorage.removeItem('inv-timer');
    if (window._timeForm) window._timeForm.set(hrs.toFixed(2));
    toast('Timer stopped · ' + hrs.toFixed(2) + ' hrs ready to log'); renderApp();
  } }, '■ Stop & fill');
  box.appendChild(el('span', { class: 'label' }, 'Live timer'));
  box.appendChild(clock);
  box.appendChild(state.timer ? stopBtn : startBtn);
  root.appendChild(box);
}

/* ===== INVOICES & ESTIMATES =============================================== */
function renderInvoices(root) {
  root.appendChild(el('div', { class: 'section-title' }, 'Invoices & estimates'));
  root.appendChild(el('div', { class: 'section-sub' }, 'Build from un-billed billable items; record payments; export PDFs.'));
  if (state.invoiceDraft) return renderInvoiceBuilder(root);

  root.appendChild(div({ style: { display: 'flex', gap: '10px', marginBottom: '22px', flexWrap: 'wrap' } },
    el('button', { class: 'btn', onclick: () => startDraft('invoice') }, '+ New invoice'),
    el('button', { class: 'btn ghost', onclick: () => startDraft('estimate') }, '+ New estimate')));

  renderRecurring(root);

  // filter chips
  const chips = [['all', 'All'], ['invoice', 'Invoices'], ['estimate', 'Estimates'], ['unpaid', 'Unpaid'], ['overdue', 'Overdue']];
  root.appendChild(div({ class: 'toolbar' }, chips.map(([k, l]) =>
    el('button', { class: 'btn sm ' + (state.invFilter === k ? '' : 'ghost'), onclick: () => { state.invFilter = k; renderApp(); } }, l))));

  let list = state.invoices.slice();
  if (state.invFilter === 'invoice' || state.invFilter === 'estimate') list = list.filter(i => (i.doc_type || 'invoice') === state.invFilter);
  else if (state.invFilter === 'unpaid') list = list.filter(i => i.doc_type !== 'estimate' && invStatus(i) !== 'paid');
  else if (state.invFilter === 'overdue') list = list.filter(i => invStatus(i) === 'overdue');
  if (!list.length) return root.appendChild(div({ class: 'empty' }, 'Nothing here yet.'));

  const rows = list.map(inv => {
    const st = invStatus(inv); const bal = num(inv.total) - paidFor(inv.id);
    return el('tr', {},
      el('td', { class: 'mono' }, inv.invoice_number), el('td', {}, clientName(inv.client_id)),
      el('td', { class: 'mono hide-sm', style: { fontSize: '13px' } }, inv.issue_date),
      el('td', {}, el('span', { class: 'pill ' + st }, st)),
      el('td', { class: 'num' }, fmtMoney(inv.total, inv.currency)),
      el('td', { class: 'num hide-sm' }, inv.doc_type === 'estimate' ? '—' : fmtMoney(bal, inv.currency)),
      el('td', {}, div({ class: 'row-actions' },
        el('button', { class: 'btn ghost sm', onclick: () => downloadPdf(inv) }, 'PDF'),
        inv.doc_type === 'estimate'
          ? el('button', { class: 'btn ghost sm', onclick: () => convertEstimate(inv) }, '→ Invoice')
          : el('button', { class: 'btn ghost sm', onclick: () => recordPayment(inv) }, 'Pay'),
        el('button', { class: 'btn danger sm', onclick: () => deleteInvoice(inv) }, 'Del'))));
  });
  root.appendChild(tblScroll(el('table', {}, el('thead', {}, el('tr', {},
    el('th', {}, 'Number'), el('th', {}, 'Client'), el('th', { class: 'hide-sm' }, 'Issued'), el('th', {}, 'Status'),
    el('th', { class: 'num' }, 'Total'), el('th', { class: 'num hide-sm' }, 'Balance'), el('th', {}, ''))),
    el('tbody', {}, rows))));
}

function startDraft(docType) {
  if (!state.clients.length) return toast('Add a client first', true);
  state.invoiceDraft = { docType, client_id: '', from: '', to: today(), issue: today(), due: '',
    taxRate: num(state.settings?.tax_rate), tax2Rate: num(state.settings?.tax2_rate), discount: 0, discountPct: true,
    notes: state.settings?.payment_terms || '', items: null, manual: [] };
  renderApp();
}

async function recordPayment(inv) {
  const bal = num(inv.total) - paidFor(inv.id);
  const amt = prompt('Payment amount for ' + inv.invoice_number + ' (balance ' + fmtMoney(bal, inv.currency) + '):', bal.toFixed(2));
  if (amt == null) return;
  if (!num(amt)) return toast('Invalid amount', true);
  await insert('payments', { invoice_id: inv.id, amount: num(amt), paid_date: today() }, 'Payment recorded');
}
async function convertEstimate(est) {
  if (!confirm('Create an invoice from estimate ' + est.invoice_number + '?')) return;
  try {
    const number = (state.settings.invoice_prefix || '') + (state.settings.invoice_next || 1);
    const r = await sb.from('invoices').insert({ client_id: est.client_id, invoice_number: number, doc_type: 'invoice',
      issue_date: today(), due_date: null, currency: est.currency, tax_rate: est.tax_rate, tax2_rate: est.tax2_rate,
      discount: est.discount, discount_is_pct: est.discount_is_pct, notes: est.notes, line_items: est.line_items,
      subtotal: est.subtotal, tax: est.tax, total: est.total }).select().single();
    if (r.error) throw r.error;
    await sb.from('settings').update({ invoice_next: (state.settings.invoice_next || 1) + 1 }).eq('user_id', state.session.user.id);
    toast('Invoice ' + number + ' created'); loadAll();
  } catch (e) { fail('Convert failed', e); }
}
async function deleteInvoice(inv) {
  if (!confirm('Delete ' + inv.invoice_number + '? Its entries become un-billed.')) return;
  await sb.from('time_entries').update({ invoice_id: null }).eq('invoice_id', inv.id);
  await sb.from('expenses').update({ invoice_id: null }).eq('invoice_id', inv.id);
  await del('invoices', inv.id, 'Invoice deleted');
}

    el('td', {}, '✎'), el('td', { class: 'mono', style: { fontSize: '13px' } }, d.issue), el('td', {}, el('span', { class: 'label' }, 'manual')),
    el('td', {}, el('input', { value: m.description, placeholder: 'e.g. Late fee', oninput: e => m.description = e.target.value })),
    el('td', {}, ''), el('td', {}, ''),
    el('td', { class: 'num' }, el('input', { type: 'number', step: '0.01', value: m.amount, style: { maxWidth: '110px', marginLeft: 'auto' }, oninput: e => { m.amount = num(e.target.value); refresh(); } })))));

  root.appendChild(tblScroll(el('table', {}, el('thead', {}, el('tr', {},
    el('th', {}, ''), el('th', {}, 'Date'), el('th', {}, 'Kind'), el('th', {}, 'Description'),
    el('th', { class: 'num' }, 'Hrs'), el('th', { class: 'num' }, 'Rate'), el('th', { class: 'num' }, 'Amount'))),
    el('tbody', {}, rows))));
  root.appendChild(el('button', { class: 'btn ghost sm', style: { marginTop: '10px' }, onclick: () => { d.manual.push({ description: '', amount: 0 }); renderApp(); } }, '+ Add manual line'));

  // adjustments
  root.appendChild(div({ class: 'card', style: { marginTop: '20px' } }, div({ class: 'form-grid' },
    field('Discount', el('input', { type: 'number', step: '0.01', value: d.discount, oninput: e => { d.discount = num(e.target.value); refresh(); } })),
    field('Discount type', (() => { const s = el('select', { onchange: e => { d.discountPct = e.target.value === 'pct'; refresh(); } }); s.appendChild(el('option', { value: 'pct', selected: d.discountPct }, 'percent %')); s.appendChild(el('option', { value: 'flat', selected: !d.discountPct }, 'flat ' + code)); return s; })()),
    field((state.settings?.tax_name || 'Tax') + ' %', el('input', { type: 'number', step: '0.01', value: d.taxRate, oninput: e => { d.taxRate = num(e.target.value); refresh(); } })),
    field((state.settings?.tax2_name || 'Tax 2') + ' %', el('input', { type: 'number', step: '0.01', value: d.tax2Rate, oninput: e => { d.tax2Rate = num(e.target.value); refresh(); } })))));

  }
}

async function loadDraftItems() {
  const d = state.invoiceDraft;
  try {
    const range = (q) => { if (d.from) q = q.gte('entry_date', d.from); if (d.to) q = q.lte('entry_date', d.to); return q; };
    const [t, e] = await Promise.all([
      range(sb.from('time_entries').select('*').eq('client_id', d.client_id).eq('billable', true).is('invoice_id', null)),
      range(sb.from('expenses').select('*').eq('client_id', d.client_id).eq('billable', true).is('invoice_id', null)),
    ]);
    if (t.error) throw t.error; if (e.error) throw e.error;
    d.items = [
      ...t.data.map(r => ({ include: true, src: 'time_entries', id: r.id, type: 'time', date: r.entry_date, description: r.description, qty: num(r.hours), rate: num(r.rate), amount: num(r.hours) * num(r.rate) })),
      ...e.data.map(r => ({ include: true, src: 'expenses', id: r.id, type: 'expense', date: r.entry_date, description: r.description, qty: 1, rate: num(r.amount), amount: num(r.amount) })),
    ].sort((a, b) => a.date.localeCompare(b.date));
    renderApp();
  } catch (err) { fail('Load items failed', err); }
}

async function saveInvoice() {
  const d = state.invoiceDraft;
  if (!d._chosen.length) return toast('Select at least one item', true);
  const est = d.docType === 'estimate';
  try {
    const prefix = est ? (state.settings.estimate_prefix || 'EST-') : (state.settings.invoice_prefix || '');
    const nextField = est ? 'estimate_next' : 'invoice_next';
    const number = prefix + (state.settings[nextField] || 1);
    const lineItems = d._chosen.map(({ include, src, id, ...keep }) => keep);
    const r = await sb.from('invoices').insert({ client_id: d.client_id, invoice_number: number, doc_type: d.docType,
      issue_date: d.issue, due_date: d.due || null, currency: clientCcy(d.client_id), tax_rate: d.taxRate, tax2_rate: d.tax2Rate,
      discount: d.discount, discount_is_pct: d.discountPct, notes: d.notes, line_items: lineItems,
      subtotal: d._subtotal, tax: d._tax + d._tax2, total: d._total }).select().single();
    if (r.error) throw r.error;
    const invId = r.data.id;
    const tIds = d._chosen.filter(i => i.src === 'time_entries').map(i => i.id);
    const eIds = d._chosen.filter(i => i.src === 'expenses').map(i => i.id);
    if (tIds.length) { const u = await sb.from('time_entries').update({ invoice_id: invId }).in('id', tIds); if (u.error) throw u.error; }
    if (eIds.length) { const u = await sb.from('expenses').update({ invoice_id: invId }).in('id', eIds); if (u.error) throw u.error; }
    await sb.from('settings').update({ [nextField]: (state.settings[nextField] || 1) + 1 }).eq('user_id', state.session.user.id);
    toast(number + ' saved'); downloadPdf(r.data);
    state.invoiceDraft = null; state.tab = 'invoices'; loadAll();
  } catch (err) { fail('Save failed', err); }
}

      el('button', { class: 'btn sm', onclick: () => generateFromTemplate(r) }, 'Generate now'),

  root.appendChild(tblScroll(el('table', {}, el('thead', {}, el('tr', {},
    el('th', {}, 'Name'), el('th', {}, 'Client'), el('th', {}, 'Cadence'), el('th', {}, 'Last generated'), el('th', {}, ''))),

async function saveRecurringTemplate() {
  const d = state.invoiceDraft;
  if (!d._chosen?.length) return toast('Load items first', true);
  const name = prompt('Template name:', 'Monthly retainer · ' + clientName(d.client_id));
  if (name == null) return;
  const cadence = (prompt('Cadence (weekly / monthly / quarterly):', 'monthly') || 'monthly').toLowerCase();
  await insert('recurring_templates', { client_id: d.client_id, name, cadence,
    line_items: d._chosen.map(({ include, src, id, ...k }) => k), tax_rate: d.taxRate, notes: d.notes }, 'Template saved');
}
async function generateFromTemplate(r) {
  try {
    const items = r.line_items || [];
    const subtotal = items.reduce((s, i) => s + num(i.amount), 0);
    const tax = subtotal * num(r.tax_rate) / 100;
    const number = (state.settings.invoice_prefix || '') + (state.settings.invoice_next || 1);
    const ins = await sb.from('invoices').insert({ client_id: r.client_id, invoice_number: number, doc_type: 'invoice',
      issue_date: today(), currency: clientCcy(r.client_id), tax_rate: num(r.tax_rate), notes: r.notes,
      line_items: items, subtotal, tax, total: subtotal + tax }).select().single();
    if (ins.error) throw ins.error;
    await sb.from('settings').update({ invoice_next: (state.settings.invoice_next || 1) + 1 }).eq('user_id', state.session.user.id);
    await sb.from('recurring_templates').update({ last_generated: today() }).eq('id', r.id);
    toast('Generated ' + number); downloadPdf(ins.data); loadAll();
  } catch (e) { fail('Generate failed', e); }
}

/* ===== PDF ================================================================ */
async function loadLogo(url) {
  try {
    const res = await fetch(url); const blob = await res.blob();
    return await new Promise(r => { const fr = new FileReader(); fr.onload = () => r(fr.result); fr.readAsDataURL(blob); });
  } catch { return null; }
}
async function downloadPdf(inv) {
  const { jsPDF } = window.jspdf; const doc = new jsPDF({ unit: 'pt', format: 'letter' });
  const s = state.settings || {}; const client = clientById(inv.client_id) || {}; const code = inv.currency || ccy();
  const M = 48; let y = 56;
  if (s.logo_url) { const data = await loadLogo(s.logo_url); if (data) { try { doc.addImage(data, 'PNG', M, y - 16, 90, 90); } catch {} } }
  doc.setFont('helvetica', 'bold'); doc.setFontSize(22); doc.text(s.business_name || 'Invoice', s.logo_url ? M + 104 : M, y);
  doc.setFont('helvetica', 'normal'); doc.setFontSize(9.5); doc.setTextColor(120);
  let by = y + 18; for (const line of [s.business_email, ...(s.address || '').split('\n')].filter(Boolean)) { doc.text(line, s.logo_url ? M + 104 : M, by); by += 13; }
  doc.setTextColor(40); doc.setFont('helvetica', 'bold'); doc.setFontSize(16);
  doc.text((inv.doc_type === 'estimate' ? 'ESTIMATE' : 'INVOICE'), 565, y, { align: 'right' });
  doc.setFont('helvetica', 'normal'); doc.setFontSize(10); doc.setTextColor(90);
  doc.text('No. ' + inv.invoice_number, 565, y + 18, { align: 'right' });
  doc.text('Issued: ' + (inv.issue_date || ''), 565, y + 33, { align: 'right' });
  if (inv.due_date) doc.text('Due: ' + inv.due_date, 565, y + 48, { align: 'right' });
  y = Math.max(by, y + 64) + 14;
  doc.setTextColor(150); doc.setFontSize(8.5); doc.text('BILL TO', M, y);
  doc.setTextColor(40); doc.setFontSize(11); doc.setFont('helvetica', 'bold'); doc.text(client.name || '—', M, y + 15);
  doc.setFont('helvetica', 'normal'); doc.setFontSize(9.5); doc.setTextColor(120);
  let cy = y + 30; for (const line of [client.email, ...(client.address || '').split('\n')].filter(Boolean)) { doc.text(line, M, cy); cy += 13; }
  const items = inv.line_items || [];
  doc.autoTable({ startY: cy + 16, margin: { left: M, right: M },
    head: [['Date', 'Description', 'Hrs', 'Rate', 'Amount']],
    body: items.map(it => [it.date, (it.type === 'expense' ? '[expense] ' : it.type === 'manual' ? '' : '') + (it.description || ''),
      it.type === 'time' ? String(it.qty) : '', it.type === 'time' ? fmtMoney(it.rate, code) : '', fmtMoney(it.amount, code)]),
    styles: { font: 'helvetica', fontSize: 9.5, cellPadding: 6, textColor: 40 },
    headStyles: { fillColor: [42, 32, 24], textColor: 244, fontSize: 8.5 },
    columnStyles: { 0: { cellWidth: 70 }, 2: { halign: 'right', cellWidth: 50 }, 3: { halign: 'right', cellWidth: 70 }, 4: { halign: 'right', cellWidth: 80 } },
    alternateRowStyles: { fillColor: [248, 244, 236] } });
  let ty = doc.lastAutoTable.finalY + 16;
  const line = (label, val, bold) => { doc.setFont('helvetica', bold ? 'bold' : 'normal'); doc.setFontSize(bold ? 12 : 10);
    doc.setTextColor(bold ? 185 : 90, bold ? 104 : 90, bold ? 59 : 90); doc.text(label, 430, ty, { align: 'right' }); doc.text(val, 565, ty, { align: 'right' }); ty += bold ? 20 : 16; };
  line('Subtotal', fmtMoney(inv.subtotal, code));
  if (num(inv.discount)) line('Discount', '− ' + fmtMoney(inv.discount_is_pct ? num(inv.subtotal) * num(inv.discount) / 100 : inv.discount, code));
  if (num(inv.tax)) line((s.tax_name || 'Tax'), fmtMoney(inv.tax, code));
  line('Total', fmtMoney(inv.total, code), true);
  const paid = paidFor(inv.id);
  if (paid) { line('Paid', '− ' + fmtMoney(paid, code)); line('Balance due', fmtMoney(num(inv.total) - paid, code), true); }
  if (inv.notes) { doc.setFont('helvetica', 'normal'); doc.setFontSize(9.5); doc.setTextColor(120); doc.text(doc.splitTextToSize(inv.notes, 360), M, ty + 6); }
  doc.save((inv.doc_type === 'estimate' ? 'estimate-' : 'invoice-') + inv.invoice_number + '.pdf');
}

function renderReports(root) {
  root.appendChild(el('div', { class: 'section-title' }, 'Reports'));
  root.appendChild(el('div', { class: 'section-sub' }, 'Income, utilization, year-end totals, and exports.'));

  // income by client
  const byClient = {};
  state.payments.forEach(p => { const inv = state.invoices.find(i => i.id === p.invoice_id); const cid = inv?.client_id; const key = clientName(cid); byClient[key] = (byClient[key] || 0) + num(p.amount); });
  root.appendChild(el('div', { class: 'label', style: { margin: '6px 0 10px' } }, 'Income by client (received)'));
  const ic = Object.entries(byClient).sort((a, b) => b[1] - a[1]);
  root.appendChild(ic.length ? tblScroll(el('table', {}, el('tbody', {}, ic.map(([k, v]) => el('tr', {}, el('td', {}, k), el('td', { class: 'num' }, fmtMoney(v))))))) : div({ class: 'empty' }, 'No payments recorded yet.'));

  // utilization
  const bill = state.time.filter(t => t.billable).reduce((s, t) => s + num(t.hours), 0);
  const non = state.time.filter(t => !t.billable).reduce((s, t) => s + num(t.hours), 0);
  const tot = bill + non;
  root.appendChild(div({ class: 'kpis', style: { marginTop: '24px' } },
    kpi('Billable hours', bill.toFixed(1)), kpi('Non-billable hours', non.toFixed(1)),
    kpi('Utilization', tot ? Math.round(bill / tot * 100) + '%' : '—', true)));

  // year-end
  const yr = today().slice(0, 4);
  const billedThisYear = state.invoices.filter(i => i.doc_type !== 'estimate' && i.issue_date >= yr + '-01-01').reduce((s, i) => s + num(i.total), 0);
  const receivedThisYear = state.payments.filter(p => p.paid_date >= yr + '-01-01').reduce((s, p) => s + num(p.amount), 0);
  const expThisYear = state.expenses.filter(x => x.entry_date >= yr + '-01-01').reduce((s, x) => s + num(x.amount), 0);
  root.appendChild(el('div', { class: 'label', style: { margin: '24px 0 10px' } }, yr + ' summary'));
  root.appendChild(div({ class: 'kpis' }, kpi('Invoiced', fmtMoney(billedThisYear)), kpi('Received', fmtMoney(receivedThisYear)), kpi('Expenses', fmtMoney(expThisYear))));

  // exports
  root.appendChild(el('div', { class: 'label', style: { margin: '28px 0 12px' } }, 'Export & backup'));
  root.appendChild(div({ style: { display: 'flex', gap: '10px', flexWrap: 'wrap' } },
    el('button', { class: 'btn ghost sm', onclick: exportTimeCSV }, 'Time → CSV'),
    el('button', { class: 'btn ghost sm', onclick: exportExpensesCSV }, 'Expenses → CSV'),
    el('button', { class: 'btn ghost sm', onclick: exportInvoicesCSV }, 'Invoices → CSV'),
    el('button', { class: 'btn ghost sm', onclick: backupJSON }, 'Full backup (JSON)'),
    (() => { const inp = el('input', { type: 'file', accept: '.json', style: { display: 'none' }, onchange: e => restoreJSON(e.target.files[0]) });
      const b = el('button', { class: 'btn ghost sm', onclick: () => inp.click() }, 'Restore from JSON'); return div({ style: { display: 'inline' } }, b, inp); })()));
}
function downloadFile(name, content, type) {
  const url = URL.createObjectURL(new Blob([content], { type })); const a = el('a', { href: url, download: name }); document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}
function toCSV(rows) { return rows.map(r => r.map(c => { const s = c == null ? '' : String(c); return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s; }).join(',')).join('\n'); }
function exportTimeCSV() { downloadFile('time.csv', toCSV([['Date', 'Client', 'Project', 'Description', 'Hours', 'Rate', 'Billable', 'Amount'], ...state.time.map(t => [t.entry_date, clientName(t.client_id), projectName(t.project_id), t.description, t.hours, t.rate, t.billable, num(t.hours) * num(t.rate)])]), 'text/csv'); }
function exportExpensesCSV() { downloadFile('expenses.csv', toCSV([['Date', 'Client', 'Category', 'Description', 'Amount', 'Billable'], ...state.expenses.map(x => [x.entry_date, clientName(x.client_id), x.category, x.description, x.amount, x.billable])]), 'text/csv'); }
function exportInvoicesCSV() { downloadFile('invoices.csv', toCSV([['Number', 'Type', 'Client', 'Issued', 'Due', 'Status', 'Total', 'Paid', 'Balance', 'Currency'], ...state.invoices.map(i => [i.invoice_number, i.doc_type, clientName(i.client_id), i.issue_date, i.due_date, invStatus(i), i.total, paidFor(i.id), num(i.total) - paidFor(i.id), i.currency])]), 'text/csv'); }
function backupJSON() { downloadFile('invoice-backup-' + today() + '.json', JSON.stringify({ version: 2, exported: today(), settings: state.settings, clients: state.clients, projects: state.projects, time: state.time, expenses: state.expenses, invoices: state.invoices, payments: state.payments, recurring: state.recurring }, null, 2), 'application/json'); }
async function restoreJSON(file) {
  if (!file) return;
  if (!confirm('Restore will ADD the records from this file as new rows (existing data is kept). Continue?')) return;
  try {
    const data = JSON.parse(await file.text()); const map = {};
    const reinsert = async (table, rows, fixFks) => { for (const row of rows || []) { const { id, user_id, created_at, ...rest } = row; if (fixFks) fixFks(rest); const r = await sb.from(table).insert(rest).select('id').single(); if (!r.error) map[id] = r.data.id; } };
    await reinsert('clients', data.clients);
    await reinsert('projects', data.projects, x => { if (x.client_id) x.client_id = map[x.client_id] || null; });
    await reinsert('invoices', data.invoices, x => { if (x.client_id) x.client_id = map[x.client_id] || null; });
    await reinsert('time_entries', data.time, x => { x.client_id = map[x.client_id] || null; x.project_id = map[x.project_id] || null; x.invoice_id = map[x.invoice_id] || null; });
    await reinsert('expenses', data.expenses, x => { x.client_id = map[x.client_id] || null; x.project_id = map[x.project_id] || null; x.invoice_id = map[x.invoice_id] || null; });
    await reinsert('payments', data.payments, x => { x.invoice_id = map[x.invoice_id] || null; });
    toast('Restore complete'); loadAll();
  } catch (e) { fail('Restore failed', e); }
}

/* ===== SETTINGS =========================================================== */
function renderSettings(root) {
  root.appendChild(el('div', { class: 'section-title' }, 'Settings'));
  root.appendChild(el('div', { class: 'section-sub' }, 'Business details and invoice defaults — shown on every PDF.'));
  const s = { ...state.settings };
  const bind = (key, attrs = {}) => { const tag = attrs.tag || 'input'; const node = el(tag, { ...attrs, tag: undefined, oninput: e => s[key] = e.target.value }); node.value = state.settings[key] ?? ''; return node; };
  const saveBtn = el('button', { class: 'btn', onclick: async () => {
    const { error } = await sb.from('settings').update({
      business_name: s.business_name, business_email: s.business_email, address: s.address, payment_terms: s.payment_terms,
      currency: (s.currency || 'USD').toUpperCase(), logo_url: s.logo_url, tax_name: s.tax_name, tax_rate: num(s.tax_rate),
      tax2_name: s.tax2_name, tax2_rate: num(s.tax2_rate), mileage_rate: num(s.mileage_rate),
      invoice_prefix: s.invoice_prefix, invoice_next: parseInt(s.invoice_next) || 1,
      estimate_prefix: s.estimate_prefix, estimate_next: parseInt(s.estimate_next) || 1,
    }).eq('user_id', state.session.user.id);
    if (error) return fail('Save failed', error);
    toast('Settings saved'); loadAll();
  } }, 'Save settings');
  root.appendChild(div({ class: 'card' }, div({ class: 'form-grid' },
    field('Business name', bind('business_name')), field('Business email', bind('business_email', { type: 'email' })),
    field('Currency (ISO)', bind('currency', { placeholder: 'USD' })), field('Logo URL', bind('logo_url', { placeholder: 'https://…/logo.png' })),
    field('Tax name', bind('tax_name', { placeholder: 'Tax / VAT / GST' })), field('Tax %', bind('tax_rate', { type: 'number', step: '0.01' })),
    field('Tax 2 name', bind('tax2_name')), field('Tax 2 %', bind('tax2_rate', { type: 'number', step: '0.01' })),
    field('Mileage rate', bind('mileage_rate', { type: 'number', step: '0.01' })),
    field('Invoice prefix', bind('invoice_prefix')), field('Next invoice #', bind('invoice_next', { type: 'number' })),
    field('Estimate prefix', bind('estimate_prefix')), field('Next estimate #', bind('estimate_next', { type: 'number' }))),
    div({ class: 'field', style: { marginTop: '14px' } }, el('span', { class: 'label' }, 'Address'), bind('address', { tag: 'textarea' })),
    div({ class: 'field', style: { marginTop: '14px' } }, el('span', { class: 'label' }, 'Default payment terms / notes'), bind('payment_terms', { tag: 'textarea' })),
    div({ style: { marginTop: '16px' } }, saveBtn)));
}

/* ===== keyboard shortcuts ================================================= */
const tabOrder = ['dashboard', 'time', 'expenses', 'clients', 'projects', 'invoices', 'reports', 'settings'];
document.addEventListener('keydown', (e) => {
  if (!state.session || e.metaKey || e.ctrlKey || e.altKey) return;
  const tag = (e.target.tagName || '').toLowerCase();
  if (tag === 'input' || tag === 'textarea' || tag === 'select') return;
  if (e.key >= '1' && e.key <= '8') { state.tab = tabOrder[+e.key - 1]; state.editing = null; renderApp(); }
  else if (e.key === 'n' && state.tab === 'invoices' && !state.invoiceDraft) startDraft('invoice');
});

/* ===== boot =============================================================== */
try { const saved = localStorage.getItem('inv-timer'); if (saved) state.timer = JSON.parse(saved); } catch {}
if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
initAuth();
</script>
<script>
(function () {
  var b = document.querySelector('.vn-burger'), m = document.getElementById('vn-menu');
  if (!b || !m) return;
  function set(open) { m.hidden = !open; b.classList.toggle('open', open); b.setAttribute('aria-expanded', String(open)); }
  b.addEventListener('click', function (e) { e.stopPropagation(); set(m.hidden); });
  document.addEventListener('click', function (e) { if (!m.hidden && !b.contains(e.target) && !m.contains(e.target)) set(false); });
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') set(false); });
})();
</script>
