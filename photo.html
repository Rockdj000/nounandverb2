<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'">
<title>Photo · verbandnoun.io</title>
<link rel="icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Hanken+Grotesk:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #EFEBE6; font-family: 'Hanken Grotesk', sans-serif; color: #283420; min-height: 100vh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }
  ::selection { background: #EC8E90; color: #2E3C24; }
  .back-link { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 1px; text-transform: lowercase; color: #8a8578; text-decoration: none; transition: color .22s; }
  .back-link:hover { color: #C45F61; }

  /* hero */
  .ph-hero {
    width: 100%; height: 72vh; min-height: 320px;
    overflow: hidden; cursor: zoom-in; position: relative;
  }
  .ph-hero img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    transition: transform .6s cubic-bezier(.2,.7,.2,1);
  }
  .ph-hero:hover img { transform: scale(1.03); }

  /* masonry */
  .ph-masonry {
    columns: 2; column-gap: 12px;
    padding: 12px clamp(24px,7vw,84px);
  }
  .ph-masonry-item {
    break-inside: avoid; margin-bottom: 12px;
    overflow: hidden; border-radius: 2px;
    cursor: zoom-in; position: relative;
  }
  .ph-masonry-item img {
    width: 100%; height: auto; display: block;
    transition: transform .5s cubic-bezier(.2,.7,.2,1);
  }
  .ph-masonry-item:hover img { transform: scale(1.04); }

  /* filmstrip */
  .ph-strip-wrap {
    padding: 24px clamp(24px,7vw,84px) 0;
  }
  .ph-strip-label {
    font-family: 'Space Mono', monospace; font-size: 10px;
    letter-spacing: 2px; text-transform: uppercase; color: #8a8578;
    margin-bottom: 10px;
  }
  .ph-strip {
    display: flex; gap: 8px;
    overflow-x: auto; scroll-snap-type: x mandatory;
    cursor: grab; user-select: none;
    scrollbar-width: none;
    padding-bottom: 4px;
  }
  .ph-strip::-webkit-scrollbar { display: none; }
  .ph-strip:active { cursor: grabbing; }
  .ph-strip-cell {
    flex: none; height: 120px; width: 180px;
    overflow: hidden; border-radius: 2px;
    scroll-snap-align: start; cursor: zoom-in;
  }
  .ph-strip-cell img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    transition: transform .4s cubic-bezier(.2,.7,.2,1), opacity .3s;
    opacity: .75;
  }
  .ph-strip-cell:hover img { transform: scale(1.06); opacity: 1; }
  .ph-strip-cell.active img { opacity: 1; }

  /* lightbox */
  #lightbox {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(29,39,24,.94);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity .3s;
  }
  #lightbox.open { opacity: 1; pointer-events: all; }
  #lightbox img {
    max-width: 92vw; max-height: 90vh;
    object-fit: contain; display: block;
    border-radius: 2px;
    transform: scale(.96);
    transition: transform .35s cubic-bezier(.2,.7,.2,1);
  }
  #lightbox.open img { transform: scale(1); }
  #lb-close {
    position: absolute; top: 24px; right: 28px;
    font-family: 'Space Mono', monospace; font-size: 11px;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: #8a8578; cursor: pointer; transition: color .2s;
  }
  #lb-close:hover { color: #EFEBE6; }
  #lb-prev, #lb-next {
    position: absolute; top: 50%; transform: translateY(-50%);
    font-family: 'Instrument Serif', serif; font-size: 40px; color: #8a8578;
    cursor: pointer; padding: 20px; transition: color .2s; line-height: 1;
    user-select: none;
  }
  #lb-prev { left: 12px; }
  #lb-next { right: 12px; }
  #lb-prev:hover, #lb-next:hover { color: #EFEBE6; }
  #lb-counter {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    font-family: 'Space Mono', monospace; font-size: 10px;
    letter-spacing: 2px; color: #8a8578;
  }
</style>
</head>
<body>
<div style="display:flex;flex-direction:column;min-height:100vh;">

  <!-- top bar -->
  <div style="display:flex;align-items:center;justify-content:space-between;padding:28px clamp(24px,7vw,84px) 18px;border-bottom:1px solid #e2dcd4;">
    <a href="index.html" class="back-link">← verbandnoun.io</a>
    <span style="font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1px;color:#8a8578;text-transform:uppercase;">02 · Photo</span>
  </div>

  <!-- header -->
  <div style="padding:56px clamp(24px,7vw,84px) 40px;">
    <h1 style="font-family:'Instrument Serif',serif;font-weight:400;font-size:clamp(64px,13vw,160px);line-height:.84;letter-spacing:-1px;color:#2E3C24;">Photo</h1>
    <p style="font-family:'Hanken Grotesk',sans-serif;font-weight:400;font-size:20px;color:#8a8578;margin-top:20px;line-height:1.5;">Photographs from the trail and elsewhere.</p>
  </div>

  <!-- masonry (resized JPEG thumbnails; full-res versions load on demand in the lightbox) -->
  <div class="ph-masonry">
    <div class="ph-masonry-item" data-idx="0"><img src="assets/opt/DSC02280-thumb.jpg" alt="" width="1400" height="933" loading="eager" fetchpriority="high"></div>
    <div class="ph-masonry-item" data-idx="1"><img src="assets/opt/DSC02275-thumb.jpg" alt="" width="1400" height="933" loading="lazy"></div>
    <div class="ph-masonry-item" data-idx="2"><img src="assets/opt/DSC02028-thumb.jpg" alt="" width="1400" height="933" loading="lazy"></div>
    <div class="ph-masonry-item" data-idx="3"><img src="assets/opt/DSC01698-thumb.jpg" alt="" width="1400" height="933" loading="lazy"></div>
    <div class="ph-masonry-item" data-idx="4"><img src="assets/opt/DSC01191-thumb.jpg" alt="" width="1400" height="933" loading="lazy"></div>
  </div>

  <!-- footer -->
  <div style="margin-top:64px;padding:28px clamp(24px,7vw,84px);border-top:1px solid #e2dcd4;display:flex;justify-content:space-between;align-items:baseline;">
    <a href="index.html" class="back-link">← back to index</a>
    <span style="font-family:'Space Mono',monospace;font-size:11px;letter-spacing:2px;color:#8a8578;">verbandnoun<span style="color:#C45F61;">.io</span></span>
  </div>

</div>

<!-- lightbox -->
<div id="lightbox">
  <span id="lb-close">esc · close</span>
  <span id="lb-prev">←</span>
  <img id="lb-img" src="" alt="">
  <span id="lb-next">→</span>
  <span id="lb-counter"></span>
</div>

<script>
(function () {
  const PHOTOS = [
    'assets/opt/DSC02280-full.jpg',
    'assets/opt/DSC02275-full.jpg',
    'assets/opt/DSC02028-full.jpg',
    'assets/opt/DSC01698-full.jpg',
    'assets/opt/DSC01191-full.jpg',
  ];

  let current = 0;
  const lb = document.getElementById('lightbox');
  const lbImg = document.getElementById('lb-img');
  const lbCounter = document.getElementById('lb-counter');

  function open(idx) {
    current = ((idx % PHOTOS.length) + PHOTOS.length) % PHOTOS.length;
    lbImg.src = PHOTOS[current];
    lbCounter.textContent = (current + 1) + ' / ' + PHOTOS.length;
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function close() {
    lb.classList.remove('open');
    document.body.style.overflow = '';
  }

  function prev() { open(current - 1); }
  function next() { open(current + 1); }

  document.getElementById('lb-close').addEventListener('click', close);
  document.getElementById('lb-prev').addEventListener('click', e => { e.stopPropagation(); prev(); });
  document.getElementById('lb-next').addEventListener('click', e => { e.stopPropagation(); next(); });
  lb.addEventListener('click', e => { if (e.target === lb || e.target === lbImg) close(); });

  document.addEventListener('keydown', e => {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') close();
    if (e.key === 'ArrowLeft') prev();
    if (e.key === 'ArrowRight') next();
  });

  // wire all clickable photo elements
  document.querySelectorAll('[data-idx]').forEach(el => {
    el.addEventListener('click', () => open(+el.dataset.idx));
  });
})();
</script>
</body>
</html>
